version: '3.3'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15
    container_name: chatbot-postgres
    environment:
      POSTGRES_DB: chatbot_db
      POSTGRES_USER: gabriel
      POSTGRES_PASSWORD: chatbot123
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gabriel -d chatbot_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - chatbot-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: chatbot-redis
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - chatbot-network

  # Frontend Next.js
  frontend:
    build: ./client
    container_name: chatbot-frontend
    ports:
      - "3000:3000"
    depends_on:
      - postgres
      - redis
    environment:
      - POSTGRES_URL=postgresql://gabriel:chatbot123@postgres:5432/chatbot_db
      - REDIS_URL=redis://redis:6379
      - AUTH_SECRET=6c4e5c17ab48c86bd1cb5632e6c8170b
    volumes:
      - ./client:/app
      - /app/node_modules
    networks:
      - chatbot-network

  # TODO: Add FastAPI/Flask backend service here
  # backend:
  #   build: ./backend
  #   ports:
  #     - "8000:8000"
  #   depends_on:
  #     - postgres
  #     - redis
  #   environment:
  #     - POSTGRES_URL=postgresql://gabriel:chatbot123@postgres:5432/chatbot_db
  #     - REDIS_URL=redis://redis:6379

volumes:
  postgres_data:
  redis_data:

networks:
  chatbot-network:
    driver: bridge
